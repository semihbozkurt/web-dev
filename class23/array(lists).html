<!DOCTYPE html>
<html>
    <head>
        <title>arrays</title>
    </head>
    <body>
        <script>
            var cars=['toyota','woswogen','audi']
            document.write(cars,'<br>')
            document.write(cars[2],'<br>')
            document.write(cars.join('_'),'<br>')
            document.write(cars.pop(),'<br>') //pop() removes the last element
            document.write(cars,'<br>')

            function add(a,b){
                return a+b;
            }
            function avarage(a,b){ return add(a,b)/2}

            document.write(avarage(10,20))
        </script>
    </body>
</html>
