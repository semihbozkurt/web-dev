<!DOCTYPE html>
<html>
    <head>
        <title>badge</title>
        <style>
            .p1{
                height: 200px;
                width: 200px;
                margin: 0px auto;
            }
        </style>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <button class="btn btn-primary" onclick="inc()">increase</button>

        <div class="p1 text-white bg-dark " style="display: flex; justify-content: center; align-items: center;">
            <div style="position: relative;">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-bell" viewBox="0 0 16 16">
  <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"/>

</svg>
                <span id="id1" class="badge bg-danger rounder-pill" style="position: absolute; top: 0%; left: 80%;">9</span>
            </div>
        </div>

        <br><br>

        <div class="progress">
            <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" style="width: 74%;">74%</div>
        </div>

        <script>
            var v=9
            function inc(){
                v+=1
                document.getElementById("id1").innerHTML=v
            }
        </script>
    </body>
</html>
